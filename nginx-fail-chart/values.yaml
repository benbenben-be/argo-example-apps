replicaCount: 2

image:
  repository: nginx
  tag: "1.25"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

tests:
  enabled: true
  image: curlimages/curl:8.6.0
  # URL of the central Testing Service API (override in ArgoCD Application values)
  testingApiUrl: "http://testing-service-api.default.svc.cluster.local:8082"
  suite: smoke

{{- if .Values.tests.enabled }}
# PostSync hook — calls the central Testing Service API which creates and tracks
# a test Job in this cluster. This hook is intentionally designed to fail
# (tests a path that returns 404) to demonstrate degraded application state.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Chart.Name }}-test-trigger
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: trigger
          image: curlimages/curl:8.6.0
          env:
            - name: TESTING_API_URL
              value: {{ .Values.tests.testingApiUrl | quote }}
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          command:
            - sh
            - -c
            - |
              echo "Triggering (intentionally failing) test run for {{ .Chart.Name }} via Testing Service..."
              HTTP_CODE=$(curl -sf -w "%{http_code}" -o /tmp/response.json \
                -X POST "$TESTING_API_URL/api/runs" \
                -H "Content-Type: application/json" \
                -d '{
                  "app":        "{{ .Chart.Name }}",
                  "cluster":    "in-cluster",
                  "deployment": "{{ .Chart.Name }}",
                  "namespace":  "'"$NAMESPACE"'",
                  "image":      "curlimages/curl:8.6.0",
                  "suite":      "{{ .Values.tests.suite }}",
                  "command":    ["sh", "-c", "echo Testing {{ .Chart.Name }}... && curl -sf http://{{ .Chart.Name }}.'"$NAMESPACE"'.svc.cluster.local/this-does-not-exist && echo PASS || (echo FAIL - expected 404 && exit 1)"]
                }')
              echo "Response (HTTP $HTTP_CODE):"
              cat /tmp/response.json
              if [ "$HTTP_CODE" -eq 201 ]; then
                echo "✅ Test run triggered successfully (test itself will fail as designed)"
              else
                echo "❌ Failed to trigger test run (HTTP $HTTP_CODE)"
                exit 1
              fi
  backoffLimit: 0
  activeDeadlineSeconds: 60
{{- end }}

apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-working-7
  labels:
    app: {{ .Chart.Name }}-working-7
    app.kubernetes.io/name: {{ .Chart.Name }}-working-7
    app.kubernetes.io/component: webserver
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: {{ .Chart.Name }}-working-7

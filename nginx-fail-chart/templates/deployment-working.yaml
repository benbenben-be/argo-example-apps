apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-working
  labels:
    app: {{ .Chart.Name }}-working
    app.kubernetes.io/name: {{ .Chart.Name }}-working
    app.kubernetes.io/instance: {{ .Chart.Name }}-working
    app.kubernetes.io/part-of: nginx-fail-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}-working
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-working
    spec:
      containers:
      - name: nginx
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 80

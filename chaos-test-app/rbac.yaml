apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-test-sa
  namespace: chaos-test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chaos-test-role
  namespace: chaos-test
rules:
- apiGroups: ["chaos-mesh.org"]
  resources: ["podchaos"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "delete", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chaos-test-rolebinding
  namespace: chaos-test
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: chaos-test-role
subjects:
- kind: ServiceAccount
  name: chaos-test-sa
  namespace: chaos-test
